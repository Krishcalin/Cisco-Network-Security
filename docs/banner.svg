<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04080f"/>
      <stop offset="40%" style="stop-color:#0b1121"/>
      <stop offset="100%" style="stop-color:#07101e"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="35%" style="stop-color:#10b981"/>
      <stop offset="70%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="clip"><rect width="900" height="230" rx="14"/></clipPath>
  </defs>

  <!-- Base -->
  <rect width="900" height="230" rx="14" fill="url(#bg)"/>
  <rect width="900" height="3" rx="1.5" fill="url(#topBar)" clip-path="url(#clip)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.025" clip-path="url(#clip)">
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#10b981"/>
    </pattern>
    <rect width="900" height="230" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow behind icon area -->
  <ellipse cx="100" cy="115" rx="110" ry="100" fill="url(#ambientGlow)"/>

  <!-- ═══ Shield + Network Icon ═══ -->
  <g transform="translate(42, 32)" filter="url(#glow)">
    <!-- Shield body -->
    <path d="M56 8 L100 26 L100 80 C100 112 80 132 56 142 C32 132 12 112 12 80 L12 26 Z"
          fill="url(#shieldFill)" stroke="url(#shieldStroke)" stroke-width="2"/>

    <!-- Network topology inside shield -->
    <!-- Connections -->
    <line x1="56" y1="45" x2="36" y2="72" stroke="#06b6d4" stroke-width="1.2" opacity="0.4"/>
    <line x1="56" y1="45" x2="76" y2="72" stroke="#06b6d4" stroke-width="1.2" opacity="0.4"/>
    <line x1="56" y1="45" x2="56" y2="80" stroke="#10b981" stroke-width="1.2" opacity="0.5"/>
    <line x1="36" y1="72" x2="36" y2="105" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <line x1="56" y1="80" x2="56" y2="105" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <line x1="76" y1="72" x2="76" y2="105" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>

    <!-- NGFW node (top) -->
    <polygon points="56,33 68,39 68,51 56,57 44,51 44,39" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <text x="56" y="49" font-family="monospace" font-size="7" fill="#10b981" text-anchor="middle" font-weight="bold">FW</text>

    <!-- Router nodes -->
    <circle cx="36" cy="72" r="10" fill="#0a1628" stroke="#06b6d4" stroke-width="1.3"/>
    <text x="36" y="75.5" font-family="monospace" font-size="6.5" fill="#06b6d4" text-anchor="middle">R</text>
    <circle cx="76" cy="72" r="10" fill="#0a1628" stroke="#06b6d4" stroke-width="1.3"/>
    <text x="76" y="75.5" font-family="monospace" font-size="6.5" fill="#06b6d4" text-anchor="middle">R</text>
    <circle cx="56" cy="80" r="8" fill="#0a1628" stroke="#10b981" stroke-width="1.3"/>
    <text x="56" y="83.5" font-family="monospace" font-size="6" fill="#10b981" text-anchor="middle">C</text>

    <!-- Switch + AP nodes (bottom row) -->
    <rect x="26" y="100" width="20" height="11" rx="2.5" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
    <text x="36" y="109" font-family="monospace" font-size="5.5" fill="#3b82f6" text-anchor="middle">SW</text>
    <rect x="46" y="100" width="20" height="11" rx="2.5" fill="#0a1628" stroke="#3b82f6" stroke-width="1"/>
    <text x="56" y="109" font-family="monospace" font-size="5.5" fill="#3b82f6" text-anchor="middle">SW</text>
    <rect x="66" y="100" width="20" height="11" rx="2.5" fill="#0a1628" stroke="#8b5cf6" stroke-width="1"/>
    <text x="76" y="109" font-family="monospace" font-size="5.5" fill="#8b5cf6" text-anchor="middle">AP</text>

    <!-- Check mark at shield bottom -->
    <path d="M48 120 L54 126 L66 112" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <!-- ═══ Typography ═══ -->
  <!-- Label -->
  <text x="220" y="58" font-family="'Courier New', monospace" font-size="10" fill="#10b981" letter-spacing="5" opacity="0.6">CISCO INFRASTRUCTURE AUDIT</text>

  <!-- Title -->
  <text x="220" y="98" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Network Security</text>
  <text x="220" y="132" font-family="'Courier New', monospace" font-size="26" fill="#10b981" font-weight="700" letter-spacing="2">Scanner</text>

  <!-- Divider -->
  <line x1="220" y1="146" x2="490" y2="146" stroke="#1e293b" stroke-width="1"/>

  <!-- Device list -->
  <text x="220" y="166" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Switches</text>
  <circle cx="284" cy="163" r="1.5" fill="#334155"/>
  <text x="294" y="166" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Routers</text>
  <circle cx="354" cy="163" r="1.5" fill="#334155"/>
  <text x="364" y="166" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Wireless APs</text>
  <circle cx="450" cy="163" r="1.5" fill="#334155"/>
  <text x="460" y="166" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">NGFW</text>

  <!-- Standards badges row -->
  <g transform="translate(220, 180)">
    <rect x="0" y="0" width="98" height="22" rx="5" fill="rgba(16,185,129,0.06)" stroke="#10b981" stroke-width="0.6" opacity="0.8"/>
    <text x="49" y="15" font-family="monospace" font-size="8.5" fill="#10b981" text-anchor="middle" opacity="0.9">CIS Benchmark</text>

    <rect x="106" y="0" width="115" height="22" rx="5" fill="rgba(6,182,212,0.06)" stroke="#06b6d4" stroke-width="0.6" opacity="0.8"/>
    <text x="163" y="15" font-family="monospace" font-size="8.5" fill="#06b6d4" text-anchor="middle" opacity="0.9">Cisco Hardening</text>

    <rect x="229" y="0" width="95" height="22" rx="5" fill="rgba(99,102,241,0.06)" stroke="#6366f1" stroke-width="0.6" opacity="0.8"/>
    <text x="276" y="15" font-family="monospace" font-size="8.5" fill="#6366f1" text-anchor="middle" opacity="0.9">NSA FTD Guide</text>
  </g>

  <!-- ═══ Right side stats ═══ -->
  <!-- Version pill -->
  <g transform="translate(770, 50)">
    <rect x="0" y="0" width="80" height="30" rx="15" fill="rgba(16,185,129,0.07)" stroke="#10b981" stroke-width="0.8"/>
    <text x="40" y="20" font-family="monospace" font-size="14" fill="#10b981" text-anchor="middle" font-weight="700">v1.0</text>
  </g>

  <!-- Stat cards -->
  <g transform="translate(740, 100)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="12" y="20" font-family="monospace" font-size="18" fill="#10b981" font-weight="700">10</text>
    <text x="38" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">modules</text>
  </g>
  <g transform="translate(740, 138)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="12" y="20" font-family="monospace" font-size="18" fill="#06b6d4" font-weight="700">128+</text>
    <text x="60" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">checks</text>
  </g>
  <g transform="translate(740, 176)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="12" y="20" font-family="monospace" font-size="14" fill="#6366f1" font-weight="700">0</text>
    <text x="28" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#64748b">dependencies</text>
  </g>
</svg>
