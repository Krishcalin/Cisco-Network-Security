!
! Cisco Catalyst 9800-CL Wireless Controller -- IOS-XE 17.9.3 (vulnerable to CVE-2025-20188 AP image download RCE)
!
Cisco IOS XE Software, Version 17.09.03
Cisco IOS XE Software for Catalyst 9800 Wireless LAN Controller, Version 17.9.3
!
version 17.9
hostname WLC-9800-CAMPUS-01
!
enable secret 9 $9$WLCsanitized
service password-encryption
!
username wifiops privilege 15 secret 9 $9$abc$sanitized
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa authentication dot1x default group radius
aaa authorization exec default group tacacs+ local
aaa accounting exec default start-stop group tacacs+
!
ip http server
ip http secure-server
ip http authentication aaa
!
ip ssh version 2
!
! Out-of-band AP Image Download enabled -- the CVE-2025-20188 attack surface
ap upgrade staggered enable
!
wireless management interface Vlan100
!
wlan CORPORATE 1 corp-ssid
 client vlan 110
 security wpa wpa2
 security wpa wpa2 ciphers aes
 security dot1x authentication-list dot1x-default
 mfp client required
 no shutdown
!
wlan GUEST 2 guest-ssid
 client vlan 120
 security wpa wpa2 psk ascii sanitized
 mfp client optional
 no shutdown
!
wireless tag policy default-policy-tag
 wlan CORPORATE policy default-policy-profile
!
ap profile default-ap-profile
 country IN
 description "Default AP profile"
!
snmp-server community publicRO RO
snmp-server host 10.100.0.10 publicRO
!
ntp server 10.100.0.20
!
interface Vlan100
 ip address 10.100.0.5 255.255.255.0
!
line con 0
 exec-timeout 10 0
 login local
!
line vty 0 4
 exec-timeout 10 0
 transport input ssh
 login authentication default
!
banner login ^Authorized access only.^
!
end
