!
! Cisco Nexus 9000 — NX-OS 9.3(11) (vulnerable to CVE-2024-20399 Velvet Ant + Python/Bash escapes)
!
Cisco Nexus Operating System (NX-OS) Software, Version 9.3(11)
TAC support: http://www.cisco.com/tac
!
version 9.3(11) Bios:version 07.69
hostname N9K-LEAF-01
!
feature ospf
feature bgp
feature interface-vlan
feature lacp
feature lldp
feature scp-server
feature ssh
feature telnet
!
! Telnet enabled -- triggers mgmt plane finding too
!
username admin role network-admin
username admin password 5 sanitized
username netops role network-operator
!
ssh key rsa 2048
!
! AAA with local fallback only (no TACACS)
aaa authentication login default local
!
! SNMPv2c with default community
snmp-server community public group network-operator
snmp-server community private group network-admin
snmp-server host 10.60.0.10 traps version 2c public
snmp-server enable traps
!
ntp server 10.60.0.20
!
vrf context management
  ip route 0.0.0.0/0 10.60.0.1
!
interface mgmt0
  vrf member management
  ip address 10.60.0.5/24
!
interface Ethernet1/1
  description Uplink
  switchport mode trunk
  switchport trunk allowed vlan 10,20,30
  no shutdown
!
interface Vlan10
  description Server VLAN
  no shutdown
  ip address 10.10.0.1/24
!
router ospf 1
  router-id 10.60.0.5
  area 0.0.0.0 authentication message-digest
!
router bgp 65000
  router-id 10.60.0.5
  neighbor 10.60.0.6
    remote-as 65000
    update-source loopback0
!
line vty
  session-limit 10
  exec-timeout 30
!
banner motd ^Authorized access only^
!
boot nxos bootflash:/nxos.9.3.11.bin
!
end
