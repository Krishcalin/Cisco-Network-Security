!
! Cisco Catalyst 9300 — IOS-XE 17.9.1 (vulnerable to CVE-2023-20198 / 20273 / 2025-20352)
! Show version output included so CVE detection can identify the train.
!
Cisco IOS XE Software, Version 17.09.01
Cisco IOS Software [Cupertino], Catalyst L3 Switch Software (CAT9K_IOSXE), Version 17.9.1
Catalyst 9300 stack, ROM: IOS-XE ROMMON
!
version 17.9
hostname CORE-SW-CAT9K-01
!
enable secret 9 $9$BPjnUgvpx0M1Bk$XYZsanitized
!
service password-encryption
!
username netadmin privilege 15 secret 9 $9$abc$sanitized
username readonly privilege 5 secret 9 $9$def$sanitized
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
aaa accounting exec default start-stop group tacacs+
!
! Web UI exposed -- the chain that BadCandy abused (CVE-2023-20198 + 20273)
ip http server
ip http secure-server
ip http authentication aaa
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
snmp-server community publicRO RO 99
snmp-server host 10.50.0.10 publicRO
snmp-server enable traps
!
ntp authenticate
ntp authentication-key 1 md5 sanitized
ntp trusted-key 1
ntp server 10.50.0.20 key 1
!
interface GigabitEthernet1/0/1
 description Uplink
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
 spanning-tree bpduguard enable
!
interface Vlan10
 description Management
 ip address 10.50.0.5 255.255.255.0
!
ip access-list extended VTY-MGMT
 permit ip 10.50.0.0 0.0.0.255 any
 deny ip any any log
!
line con 0
 exec-timeout 10 0
 login local
!
line vty 0 4
 exec-timeout 10 0
 transport input ssh
 access-class VTY-MGMT in
 login authentication default
!
banner login ^
WARNING: Authorized access only. Unauthorized use is prohibited and will be prosecuted.
^
!
end
