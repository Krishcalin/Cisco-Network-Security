!
! Cisco IOS Switch — Sample Config with Security Issues
!
version 15.2
hostname ACCESS-SW-01
!
enable secret 5 $1$mERr$hx5rVt7rPNoS4wqb
service password-encryption
!
aaa new-model
aaa authentication login default group tacacs+ local
aaa authorization exec default group tacacs+ local
aaa accounting commands 15 default start-stop group tacacs+
!
ip ssh version 2
ip domain-name corp.example.com
!
ip dhcp snooping
ip dhcp snooping vlan 10,20,30
!
spanning-tree mode rapid-pvst
!
vlan 10
 name Users
vlan 20
 name Servers
vlan 30
 name Management
vlan 999
 name UNUSED
!
interface GigabitEthernet0/1
 description User Port
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/2
 description User Port
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 no shutdown
!
interface GigabitEthernet0/3
 description Server Port
 switchport mode access
 switchport access vlan 20
 no shutdown
!
interface GigabitEthernet0/4
 description Unused
 no shutdown
!
interface GigabitEthernet0/5
 description Unused
 no shutdown
!
interface GigabitEthernet0/24
 description Trunk to Core
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30
 no shutdown
!
interface Vlan30
 ip address 10.30.1.10 255.255.255.0
 no shutdown
!
snmp-server community netmonitor RO
snmp-server host 10.30.1.50 netmonitor
!
logging host 10.30.1.60
logging trap informational
!
ntp server 10.30.1.1
!
banner motd ^Authorized access only. Unauthorized use is prohibited.^
!
line con 0
 login local
 exec-timeout 10 0
!
line vty 0 15
 transport input ssh
 login authentication default
 exec-timeout 10 0
!
end
