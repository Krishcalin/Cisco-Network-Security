!
! Cisco Firepower Threat Defense (FTD) — Sample Config
!
hostname FTD-NGFW-01
!
FXOS version 7.2.1
!
enable secret 9 $9$xxxx
!
username admin privilege 15 secret 9 $9$yyyy
username analyst privilege 5 secret 9 $9$zzzz
username operator privilege 15 secret 9 $9$aaaa
username backup_admin privilege 15 secret 9 $9$bbbb
username readonly privilege 1 secret 9 $9$cccc
!
aaa new-model
aaa authentication login default local
!
ip ssh version 2
!
interface GigabitEthernet0/0
 nameif outside
 security-level 0
 ip address 203.0.113.10 255.255.255.0
!
interface GigabitEthernet0/1
 nameif inside
 security-level 100
 ip address 10.1.1.1 255.255.255.0
!
interface Management0/0
 nameif management
 ip address 10.99.1.10 255.255.255.0
!
! Access Control Policy
access-list OUTSIDE-IN permit ip any any log
access-list OUTSIDE-IN deny ip any any
!
access-group OUTSIDE-IN in interface outside
!
! Default action: allow
default action allow
!
snmp-server community monitor RO
!
logging host 10.1.1.100
logging trap informational
!
ntp server 10.1.1.50
!
banner motd ^Authorized access only^
!
line con 0
 login local
 exec-timeout 5 0
!
line vty 0 4
 transport input ssh
 login local
 exec-timeout 10 0
 access-class MGMT-ACL in
!
end
