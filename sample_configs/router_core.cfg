!
! Cisco IOS Router — Sample Config with Security Issues
!
version 15.7
hostname CORE-RTR-01
!
enable password cisco123
!
no service password-encryption
!
username admin privilege 15 password 7 0822455D0A16
username operator privilege 15 password 7 046E1803362E39
username backup privilege 15 secret 5 $1$mERr$hx5rVt7rPNoS4wqb
!
aaa new-model
aaa authentication login default local none
aaa authentication login VTY-AUTH local
!
ip finger
ip bootp server
ip http server
ip http secure-server
!
ip ssh version 2
ip ssh time-out 120
ip ssh authentication-retries 5
!
ip domain-name example.com
!
interface GigabitEthernet0/0
 description WAN Uplink
 ip address 203.0.113.1 255.255.255.0
 ip directed-broadcast
 no shutdown
!
interface GigabitEthernet0/1
 description LAN
 ip address 10.1.1.1 255.255.255.0
 no shutdown
!
interface Loopback0
 ip address 10.255.255.1 255.255.255.255
!
router ospf 1
 router-id 10.255.255.1
 network 10.0.0.0 0.255.255.255 area 0
!
router bgp 65000
 neighbor 203.0.113.2 remote-as 65001
 neighbor 10.1.1.2 remote-as 65000
!
snmp-server community public RO
snmp-server community private RW
snmp-server host 10.1.1.100 public
!
ntp server 10.1.1.50
!
logging buffered 4096 debugging
!
line con 0
 exec-timeout 0 0
!
line vty 0 4
 transport input telnet ssh
 login authentication VTY-AUTH
!
line vty 5 15
 transport input ssh
!
end
