!
! Cisco ASA 5516-X -- ASA Software 9.18(2) (vulnerable to ArcaneDoor CVE-2025-20333/20362/20363)
!
Cisco Adaptive Security Appliance Software Version 9.18(2)
Hardware:   ASA5516, 8192 MB RAM, CPU Atom C2000 series 2416 MHz, 1 CPU (4 cores)
!
ASA Version 9.18(2)
hostname FW-ASA-DMZ-01
!
domain-name corp.example
!
enable password sanitized encrypted
!
names
!
interface GigabitEthernet0/0
 nameif outside
 security-level 0
 ip address 203.0.113.10 255.255.255.0
!
interface GigabitEthernet0/1
 nameif inside
 security-level 100
 ip address 10.0.0.1 255.255.255.0
!
interface Management0/0
 nameif management
 security-level 100
 ip address 10.0.0.254 255.255.255.0
 management-only
!
! WebVPN enabled -- the ArcaneDoor attack surface
webvpn
 enable outside
 anyconnect image disk0:/anyconnect-win-4.10.06079-webdeploy-k9.pkg 1
 anyconnect enable
 tunnel-group-list enable
!
group-policy DfltGrpPolicy attributes
 vpn-tunnel-protocol ssl-client
 split-tunnel-policy tunnelall
 webvpn
  anyconnect ask none default anyconnect
!
tunnel-group VPN-USERS type remote-access
tunnel-group VPN-USERS general-attributes
 default-group-policy DfltGrpPolicy
tunnel-group VPN-USERS webvpn-attributes
 group-alias VPN-USERS enable
!
username vpnuser password sanitized
!
aaa authentication ssh console LOCAL
aaa authentication http console LOCAL
!
http server enable
http 10.0.0.0 255.255.255.0 management
http 0.0.0.0 0.0.0.0 outside
!
ssh 10.0.0.0 255.255.255.0 management
ssh version 2
ssh timeout 10
!
snmp-server host inside 10.0.0.50 community sanitized
snmp-server community sanitized
snmp-server enable traps
!
logging enable
logging buffered notifications
logging trap notifications
logging host inside 10.0.0.50
!
access-list outside_in extended permit tcp any host 10.0.0.100 eq 443
access-list outside_in extended permit tcp any host 10.0.0.100 eq 80
access-group outside_in in interface outside
!
nat (inside,outside) source dynamic any interface
!
banner login Authorized access only. Unauthorized use is prohibited.
!
end
